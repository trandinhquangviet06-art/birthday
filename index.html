<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng sinh nhật!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="cake-emoji">🎂</div>
            <h1 id="title">Chúc mừng sinh nhật em bé iu!</h1>
            <div class="message-box">
                <p id="typing-text"></p>
            </div>
            <button id="btn-open">Nhấn vào đây để nhận quà 🎁</button>
        </div>
    </div>

    <div id="gift-modal" class="hidden">
        <div class="modal-content">
            <h2>Bất ngờ chưa! 🎁</h2>
            
            <div class="image-gallery">
                <img src="anh1.jpg" alt="Kỷ niệm 1">
                <img src="anh2.jpg" alt="Kỷ niệm 2">
                <img src="anh3.jpg" alt="Kỷ niệm 3">
            </div>
            
            <br>
            <img src="https://media.tenor.com/b9a3H-B2g0EAAAAi/birthday-cake.gif" alt="Bánh sinh nhật 3 tầng lộng lẫy" id="grand-cake">
            
            <br>
            <button id="btn-close">Đóng lại</button>
        </div>
    </div>

    <canvas id="fireworks"></canvas>

    <script src="script.js"></script>
</body>
</html>
