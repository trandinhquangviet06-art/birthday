<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="cake">🎂</div>
            <h1 id="title">Chúc eiu Sinh Nhật vv!</h1>
            <div class="message-box">
                <p id="typing-text"></p>
            </div>
            <button id="btn-open">Nhấn vào đây để nhận quà 🎁</button>
        </div>
    </div>
<div id="gift-modal" class="hidden">
        <div class="modal-content">
            <h2>Bất ngờ chưa! 🎁</h2>
            
            <img src="anh-cua-ban.jpg" alt="Ảnh kỷ niệm" id="my-image">
            
            <br>
            <img src="https://media.giphy.com/media/WryL7E20x0K4d4h2d9/giphy.gif" alt="3D Cake" id="cake-3d">
            
            <br>
            <button id="btn-close">Đóng lại</button>
        </div>
    </div>
    <canvas id="fireworks"></canvas>

    <script src="script.js"></script>
</body>
</html>
